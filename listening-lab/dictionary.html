<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Listening Lab Dictionary</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <div class="page-nav">
      <a class="quiz-button page-nav-button" href="quiz.html">Quiz</a>
      <a class="quiz-button page-nav-button active" href="dictionary.html">Dictionary</a>

      <button class="quiz-button active" data-quiz="B vs. V">B vs. V</button>

  <script src="dictionary.js"></script>
